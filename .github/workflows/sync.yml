name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          # Replace tharagaramanbalaji/complyos with your actual HF username and space name!
          huggingface_repo_id: tharagaramanbalaji/complyos
          hf_token: ${{ secrets.HF_TOKEN }}
